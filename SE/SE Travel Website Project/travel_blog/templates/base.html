<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Wanderlust — Seyahat Günlüğü{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  {% block extra_head %}{% endblock %}
</head>
<body>

  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">W<em>anderlust</em></a>
      <div class="nav-links">
        <a href="/" class="nav-link">Anasayfa</a>
        <a href="/gallery" class="nav-link">Galeri</a>
        <a href="/about" class="nav-link">Hakkımda</a>
        <a href="/admin/login" class="nav-link nav-link--cta">Admin</a>
      </div>
      <button class="nav-burger" id="navBurger" aria-label="Menü">
        <span></span><span></span>
      </button>
    </div>
    <div class="nav-mobile" id="navMobile">
      <a href="/">Anasayfa</a>
      <a href="/gallery">Galeri</a>
      <a href="/about">Hakkımda</a>
      <a href="/admin/login">Admin</a>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="footer-logo">W<em>anderlust</em></span>
        <p>Dünyanın her köşesinden hikayeler.</p>
      </div>
      <div class="footer-links">
        <a href="/">Anasayfa</a>
        <a href="/gallery">Galeri</a>
        <a href="/about">Hakkımda</a>
      </div>
      <p class="footer-copy">© 2024 Wanderlust. Tüm hakları saklıdır.</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
  <script src="{{ url_for('static', filename='js/globe.js') }}" defer></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
